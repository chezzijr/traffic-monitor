services:
  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.ts:/app/vite.config.ts:ro
    environment:
      - VITE_API_URL=http://backend:8000
      - VITE_DIGITAL_TWIN_URL=http://digital-twin:8001
    depends_on:
      - backend
    networks:
      - traffic-network

  backend:
    build:
      context: ./backend
    image: traffic-monitor-backend:dev
    pull_policy: never
    ports:
      - "8000:8000"
    environment:
      - SUMO_HOME=/usr/share/sumo
      - CORS_ORIGINS=["http://localhost:5173","http://frontend:5173"]
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_HOST=redis
      - GEOFABRIK_PBF_PATH=/app/simulation/data/vietnam-latest.osm.pbf
      - DIGITAL_TWIN_URL=http://digital-twin:8001
    volumes:
      - ./simulation:/app/simulation
      - ./backend/app:/app/app:ro
    depends_on:
      - redis
    networks:
      - traffic-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - traffic-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-worker:
    build:
      context: ./backend
    image: traffic-monitor-backend:dev
    pull_policy: never
    command: uv run celery -A app.celery_app worker --loglevel=info --concurrency=1
    environment:
      - SUMO_HOME=/usr/share/sumo
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_HOST=redis
      - LIBSUMO_AS_TRACI=1
      - GEOFABRIK_PBF_PATH=/app/simulation/data/vietnam-latest.osm.pbf
      - DIGITAL_TWIN_URL=http://digital-twin:8001
    volumes:
      - ./simulation:/app/simulation
      - ./backend/app:/app/app:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - traffic-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  digital-twin:
    build:
      context: ./services/digital_twin
    image: traffic-monitor-digital-twin
    ports:
      - "8001:8001"
    environment:
      - SUMO_HOME=/usr/share/sumo
      - PORT=8001
      - RL_MODEL_DIR=/simulation/models
    volumes:
      - ./services/digital_twin/data:/app/data
      - ./services/digital_twin/model:/app/model:ro
      - ./simulation:/simulation
    networks:
      - traffic-network

  camera-collector:
    build:
      context: ./services/camera_collector
    image: traffic-monitor-camera-collector
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATASET_DIR=/data/dataset
    volumes:
      - ./dataset:/data/dataset
    depends_on:
      - redis
    networks:
      - traffic-network

networks:
  traffic-network:
    driver: bridge

volumes:
  redis-data:
