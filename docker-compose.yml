services:
  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.ts:/app/vite.config.ts:ro
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - traffic-network

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - SUMO_HOME=/usr/share/sumo
      - CORS_ORIGINS=["http://localhost:5173","http://frontend:5173"]
      - CELERY_BROKER_URL=redis://redis:6379/0
    volumes:
      - ./backend/app:/app/app
      - ./simulation:/simulation
    depends_on:
      - redis
    networks:
      - traffic-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - traffic-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-worker:
    build:
      context: ./backend
    command: uv run watchfiles --filter python 'celery -A app.celery_app worker --concurrency=3 --loglevel=info' ./app
    environment:
      - SUMO_HOME=/usr/share/sumo
      - CELERY_BROKER_URL=redis://redis:6379/0
    volumes:
      - ./backend/app:/app/app
      - ./simulation:/simulation
    depends_on:
      - redis
    networks:
      - traffic-network

networks:
  traffic-network:
    driver: bridge

volumes:
  redis-data:
