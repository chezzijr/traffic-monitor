services:
  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/index.html:/app/index.html:ro
      - ./frontend/vite.config.ts:/app/vite.config.ts:ro
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
    networks:
      - traffic-network

  backend:
    build:
      context: ./backend
    image: traffic-monitor-backend
    ports:
      - "8000:8000"
    environment:
      - SUMO_HOME=/usr/share/sumo
      - CORS_ORIGINS=["http://localhost:5173","http://frontend:5173"]
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_HOST=redis
      - GEOFABRIK_PBF_PATH=/app/simulation/data/vietnam-latest.osm.pbf
    volumes:
      - ./simulation:/app/simulation
      - ./backend/app:/app/app:ro
    depends_on:
      - redis
    networks:
      - traffic-network

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - traffic-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery-worker:
    image: traffic-monitor-backend
    command: uv run celery -A app.celery_app worker --loglevel=info --concurrency=1
    environment:
      - SUMO_HOME=/usr/share/sumo
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - REDIS_HOST=redis
      - LIBSUMO_AS_TRACI=1
      - GEOFABRIK_PBF_PATH=/app/simulation/data/vietnam-latest.osm.pbf
    volumes:
      - ./simulation:/app/simulation
      - ./backend/app:/app/app:ro
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - traffic-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

networks:
  traffic-network:
    driver: bridge

volumes:
  redis-data:
