# Tracker type
tracker_type: botsort

# Detection thresholds
track_high_thresh: 0.5      # High confidence detection threshold
track_low_thresh: 0.1       # Low confidence detection threshold
new_track_thresh: 0.7       # Higher = less eager to create new tracks, prefer re-association

# Matching parameters
match_thresh: 0.8           # IOU threshold for matching
track_buffer: 120           # ~4 seconds at 30fps

# Motion model parameters
fuse_score: true
proximity_thresh: 0.5       # Spatial proximity threshold
appearance_thresh: 0.25     # ReID appearance threshold

# Global Motion Compensation
gmc_method: none            # Camera is stationary — no motion to compensate

# ReID model — disabled (no external model download needed)
with_reid: false

# Camera motion compensation
cmc_method: none            # Camera is stationary — disabled for performance